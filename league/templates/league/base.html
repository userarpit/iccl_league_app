{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICCL - Indore City Champions League</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'league/css/style.css' %}">
</head>

<body class="bg-gray-100 font-sans antialiased">
    <div class="min-h-screen flex flex-col md:flex-row">
        <header class="bg-gradient-to-r from-gray-900 to-blue-900 text-white p-4 flex items-center justify-between md:hidden">
            <h1 class="text-2xl font-bold text-yellow-300">⚽ ICCL</h1>
            <button id="menu-button" class="text-white focus:outline-none">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
                </svg>
            </button>
        </header>

        <aside id="sidebar" class="w-64 bg-gradient-to-b from-gray-900 to-blue-900 text-white p-6 shadow-lg transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out md:static md:flex-shrink-0 absolute inset-y-0 left-0 z-50">
            <h1 class="text-3xl font-bold text-yellow-300 text-center mb-8 hidden md:block">⚽ ICCL</h1>
             <nav>
                <ul>
                    <li class="mb-4">
                        <a href="{% url 'fixtures' %}"
                            class="block px-4 py-2 rounded-lg text-lg {% if active_tab == 'Fixture' %}bg-yellow-400 text-gray-900 font-semibold{% else %}hover:bg-blue-700{% endif %} transition-colors duration-200">
                            📅 Fixture
                        </a>
                    </li>
                    <li class="mb-4">
                        <a href="{% url 'results' %}"
                            class="block px-4 py-2 rounded-lg text-lg {% if active_tab == 'Result' %}bg-yellow-400 text-gray-900 font-semibold{% else %}hover:bg-blue-700{% endif %} transition-colors duration-200">
                            ⚽ Result
                        </a>
                    </li>
                    <li class="mb-4">
                        <a href="{% url 'table' %}"
                            class="block px-4 py-2 rounded-lg text-lg {% if active_tab == 'Table' %}bg-yellow-400 text-gray-900 font-semibold{% else %}hover:bg-blue-700{% endif %} transition-colors duration-200">
                            📊 Table
                        </a>
                    </li>
                    <!-- <li class="mb-4">
                        <a href="{% url 'post' %}"
                            class="block px-4 py-2 rounded-lg text-lg {% if active_tab == 'Post' %}bg-yellow-400 text-gray-900 font-semibold{% else %}hover:bg-blue-700{% endif %} transition-colors duration-200">
                            📢 Post
                        </a>
                    </li> -->
                    <li class="mb-4">
                        <a href="{% url 'stats' %}"
                            class="block px-4 py-2 rounded-lg text-lg {% if active_tab == 'Stats' %}bg-yellow-400 text-gray-900 font-semibold{% else %}hover:bg-blue-700{% endif %} transition-colors duration-200">
                            📈 Stats
                        </a>
                    </li>
                    <li class="mb-4">
                        <a href="{% url 'players' %}"
                            class="block px-4 py-2 rounded-lg text-lg {% if active_tab == 'Players' %}bg-yellow-400 text-gray-900 font-semibold{% else %}hover:bg-blue-700{% endif %} transition-colors duration-200">
                            👤 Players
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <main class="flex-1 p-4 md:p-8 overflow-y-auto">
            <h1 class="text-2xl md:text-4xl font-extrabold text-gray-800 mb-8 flex items-center justify-between">
                🏆 ICCL 4.0 - Indore City Champions League ({{ venue }})
                <a href="{% url 'admin:index' %}"
                   class="inline-block px-4 py-2 rounded-lg text-sm md:text-lg hover:bg-blue-700 transition-colors duration-200">
                    ⚙️ Admin
                </a>
            </h1>
            {% block content %}
            {% endblock %}
        </main>
    </div>

    <script>
        // JavaScript for mobile menu toggle
        document.getElementById('menu-button').addEventListener('click', function() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('-translate-x-full');
        });

        // JavaScript for dropdown change
        function navigateToWeek(selectElement, baseUrl) {
            const selectedWeek = selectElement.value;
            if (selectedWeek) {
                window.location.href = `${baseUrl}?week=${selectedWeek}`;
            }
        }
    </script>
</body>
</html>
